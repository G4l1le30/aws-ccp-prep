<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title} — AWS CLF-C02 Prep</title>
<link rel="stylesheet" href="${root}assets/css/main.css">
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <h2><a href="${root}index.html">CLF-C02 Prep</a></h2>
    <button id="sidebar-toggle" aria-label="Toggle sidebar">&times;</button>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
    <div id="search-results"></div>
  </div>
  <nav id="sidebar-nav">
    ${navigation}
  </nav>
  <div class="sidebar-footer">
    <small>AWS CLF-C02 Study Notes</small>
  </div>
</div>
<div id="content">
  ${content}
</div>
<div id="overlay"></div>
<script>var ROOT_PATH = '${root}';</script>
<script src="${root}assets/js/search.js"></script>
<script>
function toggleFolder(btn) {
  btn.classList.toggle('open');
  var content = btn.nextElementSibling;
  if (content) content.classList.toggle('open');
}
document.getElementById('sidebar-toggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', function() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});
</script>
</body>
</html>
